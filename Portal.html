<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Etheria - Portal Page</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        canvas { display: block; }

        /* Top Header Container */
        #header-main {
            position: absolute;
            top: 40px;
            width: 100%;
            text-align: center;
            pointer-events: none;
            z-index: 20;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
        }

        /* The White Logo */
        #header-main img {
            height: 60px; /* Sized to match the H1 height */
            display: inline-block;
            filter: drop-shadow(0px 0px 5px rgba(0,0,0,0.8));
        }

        /* Bottom Subtitle */
        #footer-sub {
            position: absolute;
            bottom: 40px;
            width: 100%;
            text-align: center;
            pointer-events: none;
            z-index: 20;
        }

        h1 {
            margin: 0;
            font-size: 48px;
            color: white;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 
                -1px -1px 0 #000,  
                 1px -1px 0 #000,
                -1px  1px 0 #000,
                 1px  1px 0 #000,
                 0px  0px 10px rgba(0,0,0,0.5);
        }

        h2 {
            margin: 0;
            font-size: 20px;
            font-weight: 400;
            color: white;
            text-shadow: 
                -1px -1px 0 #000,  
                 1px -1px 0 #000,
                -1px  1px 0 #000,
                 1px  1px 0 #000,
                 0px  0px 5px rgba(0,0,0,0.8);
        }
        
        #label {
            position: absolute;
            pointer-events: none;
            display: none;
            font-weight: bold;
            font-size: 18px;
            color: white; 
            text-shadow: 0px 0px 5px rgba(0,0,0,0.8);
            transition: opacity 0.2s;
            z-index: 10;
        }
    </style>
</head>
<body>

<div id="header-main">
    <h1>Welcome to the </h1>
    <img src="https://www.etheria.world/images/etheria_logo_white.png" alt="Etheria Logo">
    <h1> Portal</h1>
</div>

<div id="footer-sub">
    <h2>Visit and learn about different parts of Etheria by selecting a hexagon tile above</h2>
</div>

<div id="label"></div>

<script type="importmap">
  { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
    import * as THREE from 'three';

    const scene = new THREE.Scene();
    const aspect = window.innerWidth / window.innerHeight;
    const d = 65; 
    const camera = new THREE.OrthographicCamera(-d * aspect, d * aspect, d, -d, 1, 1000);
    camera.position.set(0, 0, 100);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const hexRadius = 10;
    const hexWidth = Math.sqrt(3) * hexRadius;
    const hexHeight = 1.5 * hexRadius;
    const tileGeo = new THREE.CircleGeometry(hexRadius * 0.96, 6);

    // --- BUTTON CONFIGURATION ---
    const buttonData = [
        { x: 0,  y: -2, color: 0x44ffff, title: "NORTH",  link: "#" },
        { x: 0,  y: 2,  color: 0xfffa69, title: "SOUTH",  link: "#" },
        { x: -2, y: -1, color: 0xccc500, title: "WEST",   link: "#" },
        { x: 1,  y: -1, color: 0x616161, title: "EAST",   link: "#" },
        { x: -2, y: 1,  color: 0x2e2e2e, title: "PORTAL", link: "#" },
        { x: 1,  y: 1,  color: 0x03a300, title: "SHOP",   link: "#" }
    ];

    const oceanMat = new THREE.MeshBasicMaterial({ color: 0x003bd1 });
    const interactiveHexes = [];
    const label = document.getElementById('label');

    function createBeehive() {
        const group = new THREE.Group();
        for (let y = -40; y <= 40; y++) {
            for (let x = -40; x <= 40; x++) {
                const b = buttonData.find(c => c.x === x && c.y === y);
                const mat = b ? new THREE.MeshBasicMaterial({ color: b.color }) : oceanMat;
                const mesh = new THREE.Mesh(tileGeo, mat);

                let xPos = x * hexWidth;
                if (Math.abs(y) % 2 !== 0) xPos += hexWidth / 2;
                let yPos = y * hexHeight;

                mesh.position.set(xPos, -yPos, 0);
                mesh.rotation.z = Math.PI / 6;
                
                if (b) {
                    mesh.userData = { isButton: true, title: b.title, link: b.link };
                    interactiveHexes.push(mesh);
                }
                group.add(mesh);
            }
        }
        scene.add(group);
    }
    createBeehive();

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    let hoveredHex = null;

    window.addEventListener('mousemove', (e) => {
        mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
        label.style.left = (e.clientX + 15) + "px";
        label.style.top = (e.clientY + 15) + "px";
    });

    window.addEventListener('click', () => {
        if (hoveredHex) window.open(hoveredHex.userData.link, '_blank');
    });

    function animate() {
        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObjects(interactiveHexes);

        if (intersects.length > 0) {
            if (hoveredHex !== intersects[0].object) {
                if (hoveredHex) hoveredHex.scale.set(1, 1, 1);
                hoveredHex = intersects[0].object;
                hoveredHex.scale.set(1.2, 1.2, 1); 
                label.style.display = 'block';
                label.innerText = hoveredHex.userData.title;
            }
        } else {
            if (hoveredHex) {
                hoveredHex.scale.set(1, 1, 1);
                hoveredHex = null;
                label.style.display = 'none';
            }
        }

        renderer.render(scene, camera);
        requestAnimationFrame(animate);
    }
    animate();

    window.onresize = () => {
        const aspect = window.innerWidth / window.innerHeight;
        camera.left = -d * aspect; camera.right = d * aspect;
        camera.top = d; camera.bottom = -d;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    };
</script>
</body>
</html>
