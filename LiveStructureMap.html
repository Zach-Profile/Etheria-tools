    function updateTopography() {
        let gCounter = 0;

        layout.forEach(p => {

                const base = p.isGreen ? new THREE.Color(0x2dcc33) : new THREE.Color(0x777777);
                const diff = (p.h - avgHeight) / 50; 
                
                if (diff > 0) {
                    finalColor.copy(base).lerp(new THREE.Color(0xffffff), diff * 1.5); 
                } else {
                    finalColor.copy(base).lerp(new THREE.Color(0x000000), Math.abs(diff) * 1.5);

            } else {
                finalColor.set(p.isGreen ? 0x2dcc33 : 0x777777);

                iGreen.setColorAt(gCounter, finalColor);
                gCounter++;
            } else {
                iGrey.setColorAt(lCounter, finalColor);
                lCounter++;
            }
        });

    // Extracted shared rendering parser so it can take either live or manual data arrays
    function parseAndRenderBlocks(blocks, tileData) {
        function wrap8(n) {
            return ((n + 128) % 256 + 256) % 256 - 128;
        }

const bRad = 0.15; 
const bWidth = 1.5 * bRad;
const bHeight = Math.sqrt(3) * bRad; 
const rowRatio = rowSpacing / colSpacing; // Links voxel scaling directly to map scaling

        const hexVoxelGeo = new THREE.CylinderGeometry(bRad, bRad, bRad, 6);
        hexVoxelGeo.rotateY(Math.PI / 2); 

        blocks.forEach(b => {
            const bId = Number(b[0]), bX = Number(b[1]), bY = Number(b[2]), bZ = Number(b[3]), bCol = Number(b[4]);
            if (bZ === -1) return;

            const pattern = library[bId] || ["0","0","0"];
            const color = convertColor(bCol);
            const mat = new THREE.MeshPhongMaterial({ color, flatShading: true });

            for (let i = 0; i < pattern.length; i += 3) {
                const q = Number(pattern[i]);
                const r = Number(pattern[i+1]);
                const yOffset = Number(pattern[i+2]);

                const localCol = wrap8(bY + r); 
                let stagger = 0;
                if (Math.abs(bY) % 2 === 1 && Math.abs(localCol) % 2 === 0) {
                    stagger = 1;
                }
                const localRow = wrap8(bX + wrap8(q + stagger));
                const localZ = wrap8(bZ + yOffset);

                const absoluteCol = tileData.c + localCol;

const lx = localCol * bWidth;
let lz = localRow * bWidth * rowRatio; // Eliminates the drift compounding error

                if (absoluteCol % 2 !== 0) lz += bHeight / 2;
                if (tileData.c % 2 !== 0) lz -= bHeight / 2;

                const mesh = new THREE.Mesh(hexVoxelGeo, mat);

                const finalX = (tileData.x - totalWidth / 2) + lx;
                const finalZ = (tileData.z - totalHeight / 2) + lz;
                
                const pillarTopY = (tileData.h * 0.3) + 0.1;
                const finalY = pillarTopY + (localZ * bRad);

                mesh.position.set(finalX, finalY, finalZ);
                buildGroup.add(mesh);
            }
        });
    }

async function fetchAndRender(tileData) {
    document.getElementById('loading').style.display = 'block';
    const infoPanel = document.getElementById('tile-info');
    infoPanel.style.display = 'none'; 
    buildGroup.clear();

    try {
        const [blocksResult, nameResult, statusResult] = await Promise.allSettled([
            contract.getBlocks(tileData.c, tileData.r),
            contract.getName(tileData.c, tileData.r),
            contract.getStatus(tileData.c, tileData.r)
        ]);

        const tileName = nameResult.status === "fulfilled" && nameResult.value ? nameResult.value : "None";
        const tileStatus = statusResult.status === "fulfilled" && statusResult.value ? statusResult.value : "None";

        infoPanel.innerHTML = `
            <strong>Tile: ${tileData.c}, ${tileData.r}</strong><br/>
            <hr style="border:0; border-top: 1px dashed #00ff00; margin: 8px 0;"/>
            <strong>Name:</strong> ${tileName}<br/>
            <strong>Status:</strong> ${tileStatus}
        `;
        infoPanel.style.display = 'block';

        if (blocksResult.status === "fulfilled") {
            parseAndRenderBlocks(blocksResult.value, tileData);
        }
    } catch (err) { 
        console.error("Sync Error:", err); 
    }
    document.getElementById('loading').style.display = 'none';
}

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

window.addEventListener('dblclick', (event) => {
    // Stop click-throughs if clicking inside our UI controls container
    if (event.target.closest('#controls')) return;

    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects([iGreen, iGrey]);
    
    if (intersects.length > 0) {
        const hit = intersects[0];
        const data = hit.object === iGreen ? greenLookup[hit.instanceId] : greyLookup[hit.instanceId];
        
        if (data) {
            console.log(`Visual Tile: ${data.c},${data.r} -> Requesting Contract: ${data.r},${data.c}`);
            const correctedData = {
                ...data,
                c: data.r, 
                r: data.c  
            };
            fetchAndRender(correctedData);
        }
    }
});

    // --- TEST BUILD UI HANDLER ---
    document.getElementById('testBuildBtn').addEventListener('click', () => {
        const colVal = parseInt(document.getElementById('testCol').value);
        const rowVal = parseInt(document.getElementById('testRow').value);
        const dataStr = document.getElementById('testBuildData').value.trim();

        if (isNaN(colVal) || isNaN(rowVal)) {
            alert("Please enter valid Column and Row integers (0-32).");
            return;
        }

        let parsedBlocks;
        try {
            parsedBlocks = JSON.parse(dataStr);
            if (!Array.isArray(parsedBlocks)) throw new Error("Data must be an outer array containing block layers.");
        } catch(e) {
            alert("Invalid JSON format. Structure must look like:\n[[0, 0, 0, 0, 55], [0, 1, 0, 0, 12]]");
            return;
        }

        // Find match inside initial layout configuration
        // In the original rendering group context: visual tile matches raw layout array positions (r = row, c = col)
        const matchedTile = layout.find(p => p.r === colVal && p.c === rowVal);

        if (!matchedTile) {
            alert("Tile coordinates outside the 33x33 map bounds.");
            return;
        }

        // Wipe previous meshes out of view
        buildGroup.clear();

        // Inject artificial metadata status
        const infoPanel = document.getElementById('tile-info');
        infoPanel.innerHTML = `
            <strong>Blocks parsed:</strong> ${parsedBlocks.length}
        `;
        infoPanel.style.display = 'block';

        // Apply coordinate adjustments to mirror the correction logic in the main event listener
        const proxyTileData = {
            ...matchedTile,
            c: matchedTile.r,
            r: matchedTile.c
        };

        // Render input matrix
        parseAndRenderBlocks(parsedBlocks, proxyTileData);
    });

    scene.add(new THREE.AmbientLight(0xffffff, 0.6));
    const sun = new THREE.DirectionalLight(0xffffff, 1.2);
    sun.position.set(100, 500, 100);
    scene.add(sun);
    camera.position.set(0, 800, 800);

    function animate() { 
        requestAnimationFrame(animate); 
        controls.update(); 
        renderer.render(scene, camera); 
    }
    animate();
</script>
</body>
</html>
